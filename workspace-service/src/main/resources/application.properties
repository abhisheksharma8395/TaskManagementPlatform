spring.application.name=workspace-service
server.port=8090

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Swagger-UI
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

springdoc.packages-to-scan=com.taskmanagement.app.workspaceservice.controller
springdoc.packages-to-exclude=com.taskmanagement.app.workspaceservice.feign

rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME}
rabbitmq.routing.key=${RABBITMQ_EXCHANGE_NAME}