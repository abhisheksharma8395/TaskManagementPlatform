spring.application.name=workspace-service
server.port=8090

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

# JWT (same secret as auth-service so we can validate tokens locally)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Feign — base URL resolved via Eureka by service name
spring.cloud.openfeign.client.config.auth-service.url=${AUTH_SERVICE_URL}

# Enable Feign Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker config for auth-service
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true