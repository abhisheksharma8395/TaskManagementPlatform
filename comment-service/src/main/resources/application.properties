spring.application.name=comment-service
server.port=8130

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}


# Feign
spring.cloud.openfeign.client.config.auth-service.url=http://localhost:8080
spring.cloud.openfeign.client.config.card-service.url=http://localhost:8120

# Enable Feign Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker config
resilience4j.circuitbreaker.instances.card-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.card-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.card-service.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.card-service.slow-call-duration-threshold=8s
resilience4j.circuitbreaker.instances.card-service.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.card-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.card-service.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.card-service.automatic-transition-from-open-to-half-open-enabled=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Amazon s3 bucket For Attachment storage
aws.s3.bucket-name=YOUR_BUCKET_NAME
aws.s3.region=YOUR_CLOUD_REGION
aws.accessKeyId=YOUR_ACCESS_KEY_ID_HERE
aws.secretKey=YOUR_SECRET_ACCESS_KEY_HERE
