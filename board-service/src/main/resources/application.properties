spring.application.name=board-service
server.port=8100

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# Feign
spring.cloud.openfeign.client.config.auth-service.url=http://localhost:8080
spring.cloud.openfeign.client.config.workspace-service.url=http://localhost:8090

# Enable Feign Circuit Breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker config
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.auth-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.auth-service.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.auth-service.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.workspace-service.sliding-window-size=20
resilience4j.circuitbreaker.instances.workspace-service.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.workspace-service.failure-rate-threshold=60
resilience4j.circuitbreaker.instances.workspace-service.slow-call-duration-threshold=5s
resilience4j.circuitbreaker.instances.workspace-service.slow-call-rate-threshold=100
resilience4j.circuitbreaker.instances.workspace-service.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.workspace-service.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.workspace-service.automatic-transition-from-open-to-half-open-enabled=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}