spring.application.name=api-gateway
server.port=8765

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

spring.security.user.name=disabled
spring.security.user.password=disabled

# CORS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allow-credentials=true

# Resilience4j Circuit Breaker config
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.workspace-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.workspace-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workspace-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.workspace-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.workspace-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.board-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.board-service.failure-rate-threshold=50
