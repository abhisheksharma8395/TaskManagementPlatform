spring.application.name=api-gateway
server.port=8765

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# CORS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.mvc.globalcors.cors-configurations.[/**].allow-credentials=true

# Routes
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[1].id=workspace-service
spring.cloud.gateway.mvc.routes[1].uri=lb://WORKSPACE-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/workspace-service/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[2].id=board-service
spring.cloud.gateway.mvc.routes[2].uri=lb://BOARD-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/board-service/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[3].id=card-service
spring.cloud.gateway.mvc.routes[3].uri=lb://CARD-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/card-service/**
spring.cloud.gateway.mvc.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[4].id=list-service
spring.cloud.gateway.mvc.routes[4].uri=lb://LIST-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/list-service/**
spring.cloud.gateway.mvc.routes[4].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[5].id=comment-service
spring.cloud.gateway.mvc.routes[5].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/comment-service/**
spring.cloud.gateway.mvc.routes[5].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[6].id=label-service
spring.cloud.gateway.mvc.routes[6].uri=lb://LABEL-SERVICE
spring.cloud.gateway.mvc.routes[6].predicates[0]=Path=/label-service/**
spring.cloud.gateway.mvc.routes[6].filters[0]=StripPrefix=1

spring.cloud.gateway.mvc.routes[7].id=notification-service
spring.cloud.gateway.mvc.routes[7].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.mvc.routes[7].predicates[0]=Path=/notification-service/**
spring.cloud.gateway.mvc.routes[7].filters[0]=StripPrefix=1

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.auth-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.auth-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.workspace-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.workspace-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.workspace-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.workspace-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.workspace-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.board-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.board-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.board-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.board-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.board-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.card-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.card-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.card-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.card-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.card-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.list-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.list-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.list-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.list-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.list-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.comment-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.comment-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.comment-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.comment-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.comment-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.label-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.label-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.label-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.label-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.label-service.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.notification-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.notification-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notification-service.wait-duration-in-open-state=10s
