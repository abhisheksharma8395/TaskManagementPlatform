resilience4j.circuitbreaker.instances.notification-service.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.authRateLimiter.limit-for-period=2
resilience4j.ratelimiter.instances.authRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.authRateLimiter.timeout-duration=0ms

resilience4j.ratelimiter.instances.defaultRateLimiter.limit-for-period=20
resilience4j.ratelimiter.instances.defaultRateLimiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.defaultRateLimiter.timeout-duration=0ms